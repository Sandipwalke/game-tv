services:
  - type: web
    name: town-sim
    runtime: docker
    plan: starter
    autoDeploy: true
    healthCheckPath: /healthz
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_SSL
        value: require
      - key: DATABASE_URL
        fromDatabase:
          name: town-sim-db
          property: connectionString

databases:
  - name: town-sim-db
    plan: starter
    databaseName: town_sim
    ipAllowList: []
